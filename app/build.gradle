plugins {
    id 'com.android.application'
}

android {
    namespace 'com.zoom.loupe'
    compileSdk 34

    defaultConfig {
        applicationId "com.zoom.loupe"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
